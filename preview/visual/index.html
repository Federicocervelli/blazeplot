<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlazePlot Visual Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { color-scheme: dark; --page-bg: #000; --panel-bg: #0a0a0a; --panel-border: #222; --text: #e5e5e5; --muted: #888; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--page-bg); color: var(--text); }
    body { font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; display: grid; grid-template-rows: auto minmax(0, 1fr) auto; }
    #topbar { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: var(--panel-bg); border-bottom: 1px solid var(--panel-border); }
    #caseName { color: var(--muted); }
    #chart { min-height: 0; width: 100%; height: 100%; }
    #status { min-height: 20px; padding: 4px 8px; background: var(--panel-bg); border-top: 1px solid var(--panel-border); color: var(--muted); white-space: pre; }
  </style>
</head>
<body>
  <header id="topbar"><strong>BlazePlot visual test</strong><span id="caseName"></span></header>
  <main id="chart"></main>
  <pre id="status">booting…</pre>
  <script type="module" src="./main.ts"></script>
</body>
</html>
