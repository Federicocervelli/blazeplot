<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlazePlot Server-Sampled + Live Candles Preview</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: #05070d; color: #e5e7eb; font: 13px/1.4 system-ui, sans-serif; }
    #app { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 0.9fr) minmax(0, 1.25fr); }
    header { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px; padding: 8px 10px; background: #0b1020; border-bottom: 1px solid #1f2937; }
    a { color: #93c5fd; }
    label { display: inline-flex; align-items: center; gap: 6px; }
    select, button { color: #e5e7eb; background: #111827; border: 1px solid #374151; border-radius: 4px; padding: 4px 8px; font: inherit; }
    button { cursor: pointer; }
    .status { color: #9ca3af; }
    .chartPane { min-height: 0; position: relative; border-top: 1px solid #111827; }
    #sampledChart, #liveChart { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <strong>Binance preview</strong>
      <a href="../">main preview</a>
      <label>symbol
        <select id="symbolSelect">
          <option>BTCUSDT</option>
          <option>ETHUSDT</option>
          <option>BNBUSDT</option>
        </select>
      </label>
      <label>server interval
        <select id="intervalSelect">
          <option value="15m">15m</option>
          <option value="1h" selected>1h</option>
          <option value="4h">4h</option>
          <option value="1d">1d</option>
        </select>
      </label>
      <button id="reloadButton" type="button">fetch sampled buckets</button>
      <span id="sampledStatus" class="status">loading…</span>
      <span id="liveStatus" class="status">connecting 5s live…</span>
    </header>
    <section class="chartPane">
      <div id="sampledChart"></div>
    </section>
    <section class="chartPane">
      <div id="liveChart"></div>
    </section>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
