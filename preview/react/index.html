<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlazePlot React Preview</title>
  <style>
    * { box-sizing: border-box; }
    :root { color-scheme: dark; --bg: #030712; --panel: #0f172a; --border: #334155; --text: #e5e7eb; --muted: #94a3b8; }
    html, body, #root { width: 100%; height: 100%; margin: 0; }
    body { background: var(--bg); color: var(--text); font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .app { height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); }
    header { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 8px 10px; background: var(--panel); border-bottom: 1px solid var(--border); }
    nav { display: flex; gap: 8px; flex-wrap: wrap; }
    a { color: var(--text); text-decoration: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; }
    a:hover { border-color: #60a5fa; }
    main { min-height: 0; display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 8px; padding: 8px; }
    section { min-height: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px; }
    h2 { margin: 0; color: var(--muted); font-size: 12px; }
    .chart { min-height: 0; width: 100%; height: 100%; }
    @media (max-width: 760px) { main { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
