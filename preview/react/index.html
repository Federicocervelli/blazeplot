<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlazePlot React Preview</title>
  <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { color-scheme: dark; --page-bg: #000; --panel-bg: #0a0a0a; --panel-border: #222; --text: #e5e5e5; --muted: #888; --control-bg: #111; --control-border: #333; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: var(--page-bg); color: var(--text); }
    body { font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .app { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); }
    #topbar { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center; padding: 5px 10px; background: var(--panel-bg); color: var(--text); justify-content: space-between; border-bottom: 1px solid var(--panel-border); }
    #topbar .left { display: inline-flex; align-items: center; gap: 8px; }
    #topbar .brand { font-weight: 700; letter-spacing: 0.02em; }
    #topbar nav { display: inline-flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    #topbar a { display: inline-flex; align-items: center; color: var(--text); text-decoration: none; padding: 0; line-height: 0; }
    #topbar a:hover { filter: brightness(1.15); }
    #topbar img { display: block; height: 20px; }
    .text-link { line-height: 1.2 !important; padding: 2px 6px !important; border: 1px solid var(--panel-border); border-radius: 4px; }
    main { min-height: 0; display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 6px; background: var(--page-bg); }
    section { min-height: 0; overflow: hidden; background: var(--panel-bg); padding: 6px 8px; }
    h2 { height: 16px; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
    .chart { height: calc(100% - 20px); min-height: 0; width: 100%; }
    @media (max-width: 760px) { main { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
