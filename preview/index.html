<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlazePlot Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --page-bg: #0b1020;
      --panel-bg: #111827;
      --panel-border: #263244;
      --text: #dbeafe;
      --muted: #8aa0bc;
      --control-bg: #0f172a;
      --control-border: #334155;
    }
    body[data-preview-theme="light"] {
      color-scheme: light;
      --page-bg: #e2e8f0;
      --panel-bg: #f8fafc;
      --panel-border: #cbd5e1;
      --text: #0f172a;
      --muted: #475569;
      --control-bg: #ffffff;
      --control-border: #94a3b8;
    }
    body[data-preview-theme="terminal"] {
      --page-bg: #020403;
      --panel-bg: #03110a;
      --panel-border: #14532d;
      --text: #bbf7d0;
      --muted: #4ade80;
      --control-bg: #020403;
      --control-border: #166534;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--page-bg); color: var(--text); }
    body { font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    #app { width: 100%; height: 100%; display: grid; grid-template-rows: minmax(0, 1fr) auto; }
    #chartPane { position: relative; min-height: 0; }
    #chart { width: 100%; height: 100%; }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 40;
      color: var(--text);
      background: color-mix(in srgb, var(--panel-bg) 88%, transparent);
      border: 1px solid color-mix(in srgb, var(--panel-border) 70%, transparent);
      white-space: pre;
      padding: 8px 10px;
      pointer-events: auto;
    }
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: center;
      padding: 10px 12px;
      background: var(--panel-bg);
      border-top: 1px solid var(--panel-border);
      color: var(--text);
    }
    fieldset { display: contents; border: 0; }
    legend { color: var(--muted); margin-right: -6px; }
    label { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
    select, button {
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      border-radius: 4px;
      color: var(--text);
      font: inherit;
      padding: 3px 6px;
    }
    button { cursor: pointer; }
    input { accent-color: #60a5fa; }
  </style>
</head>
<body data-preview-theme="dark">
  <div id="app">
    <section id="chartPane">
      <div id="chart"></div>
      <div id="overlay"><span id="copyIcon" style="cursor:pointer;">📋</span><span id="overlayText"> BlazePlot booting...</span></div>
    </section>

    <section id="controls" aria-label="Preview controls">
      <label>theme
        <select id="themeSelect">
          <option value="dark">dark</option>
          <option value="light">light</option>
          <option value="terminal">terminal</option>
        </select>
      </label>
      <label>hover
        <select id="hoverModeSelect">
          <option value="nearest-x">nearest-x</option>
          <option value="nearest-point">nearest-point</option>
        </select>
      </label>
      <label>axes
        <select id="axesSelect">
          <option value="outside">outside</option>
          <option value="inside">inside</option>
          <option value="off">off</option>
        </select>
      </label>
      <label><input id="highlightToggle" type="checkbox" checked /> highlight</label>
      <label><input id="gridToggle" type="checkbox" checked /> grid</label>
      <label><input id="followToggle" type="checkbox" checked /> follow live</label>
      <label><input id="syncXToggle" type="checkbox" checked /> sync X / Y-only zoom</label>
      <button id="perfToggleButton" type="button">hide stats</button>
      <button id="resetViewButton" type="button">reset view</button>
      <button id="screenshotButton" type="button">screenshot</button>
    </section>
  </div>
  <script type="module" src="/main.ts"></script>
</body>
</html>
