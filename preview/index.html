<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlazePlot Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --page-bg: #000;
      --panel-bg: #0a0a0a;
      --panel-border: #222;
      --text: #e5e5e5;
      --muted: #888;
      --control-bg: #111;
      --control-border: #333;
    }
    body[data-preview-theme="light"] {
      color-scheme: light;
      --page-bg: #f5f5f5;
      --panel-bg: #fff;
      --panel-border: #ddd;
      --text: #111;
      --muted: #666;
      --control-bg: #fff;
      --control-border: #bbb;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--page-bg); color: var(--text); }
    body { font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    #app { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr) auto; }
    #chartPane { position: relative; min-height: 0; }
    #chart { width: 100%; height: 100%; }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 40;
      color: var(--text);
      background: color-mix(in srgb, var(--panel-bg) 88%, transparent);
      border: 1px solid color-mix(in srgb, var(--panel-border) 70%, transparent);
      white-space: pre;
      padding: 8px 10px;
      pointer-events: auto;
    }
    #topbar,
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: center;
      padding: 10px 12px;
      background: var(--panel-bg);
      color: var(--text);
    }
    #topbar {
      justify-content: space-between;
      border-bottom: 1px solid var(--panel-border);
      padding: 5px 10px;
    }
    #controls { border-top: 1px solid var(--panel-border); }
    #topbar .left { display: inline-flex; align-items: center; gap: 8px; }
    #copyIcon { cursor: pointer; user-select: none; }
    #topbar .brand { font-weight: 700; letter-spacing: 0.02em; }
    #topbar nav { display: inline-flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    #topbar a {
      display: inline-flex;
      align-items: center;
      color: var(--text);
      text-decoration: none;
      padding: 0;
      line-height: 0;
    }
    #topbar a:hover { filter: brightness(1.15); }
    #topbar img { display: block; height: 20px; }
    fieldset { display: contents; border: 0; }
    legend { color: var(--muted); margin-right: -6px; }
    label { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
    select, button {
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      border-radius: 4px;
      color: var(--text);
      font: inherit;
      padding: 3px 6px;
    }
    button { cursor: pointer; }
    input { accent-color: #777; }
    #appendRateInput { width: 8ch; }
    #viewSamplesInput { width: 12ch; }
  </style>
</head>
<body data-preview-theme="default">
  <div id="app">
    <header id="topbar" aria-label="Project links">
      <div class="left">
        <button id="perfToggleButton" type="button">hide stats</button>
        <span id="copyIcon" title="Copy stats">📋</span>
      </div>
      <nav>
        <a href="/features/" style="line-height:1.2;padding:2px 6px;border:1px solid var(--panel-border);border-radius:4px;">feature preview</a>
        <a href="https://github.com/Federicocervelli/blazeplot" target="_blank" rel="noreferrer" aria-label="BlazePlot on GitHub">
          <img src="https://img.shields.io/github/stars/Federicocervelli/blazeplot?style=flat&logo=github&logoColor=white&label=GitHub&labelColor=111111&color=444444" alt="GitHub stars: blazeplot" />
        </a>
        <a href="https://www.npmjs.com/package/blazeplot" target="_blank" rel="noreferrer" aria-label="BlazePlot on npm">
          <img src="https://img.shields.io/npm/v/blazeplot?style=flat&logo=npm&logoColor=CB3837&label=npm&labelColor=111111&color=444444" alt="npm: blazeplot" />
        </a>
        <a href="https://cervelli.dev" target="_blank" rel="noreferrer" aria-label="Federico Cervelli portfolio">
          <img src="https://img.shields.io/badge/Portfolio-cervelli.dev-444444?style=flat&logo=googlechrome&logoColor=4285F4&labelColor=111111" alt="Portfolio: cervelli.dev" />
        </a>
        <a href="https://liberapay.com/cervelli/donate" target="_blank" rel="noreferrer" aria-label="Donate on Liberapay">
          <img src="https://img.shields.io/badge/Donate-Liberapay-444444?style=flat&logo=liberapay&logoColor=F6C915&labelColor=111111" alt="Donate: Liberapay" />
        </a>
      </nav>
    </header>

    <section id="chartPane">
      <div id="chart"></div>
      <div id="overlay"><span id="overlayText">BlazePlot booting...</span></div>
    </section>

    <section id="controls" aria-label="Preview controls">
      <label>theme
        <select id="themeSelect">
          <option value="default">default</option>
          <option value="light">light</option>
        </select>
      </label>
      <label>hover
        <select id="hoverModeSelect">
          <option value="nearest-x">nearest-x</option>
          <option value="nearest-point">nearest-point</option>
        </select>
      </label>
      <label>group
        <select id="hoverGroupSelect">
          <option value="x">x</option>
          <option value="none">none</option>
        </select>
      </label>
      <label>view samples
        <input id="viewSamplesInput" type="number" min="1000" max="1000000000" step="1000000" value="10000000" />
      </label>
      <label>append/sec
        <input id="appendRateInput" type="number" min="1" max="1000000" step="1000" value="1000" />
      </label>
      <label>axes
        <select id="axesSelect">
          <option value="outside">outside</option>
          <option value="inside">inside</option>
          <option value="off">off</option>
        </select>
      </label>
      <label><input id="followToggle" type="checkbox" checked /> follow live</label>
      <label><input id="streamToggle" type="checkbox" checked /> stream data</label>
      <label><input id="syncXToggle" type="checkbox" checked /> sync X / Y-only zoom</label>
      <button id="resetViewButton" type="button">reset view</button>
      <button id="screenshotButton" type="button">screenshot</button>
    </section>
  </div>
  <script type="module" src="/main.ts"></script>
</body>
</html>
