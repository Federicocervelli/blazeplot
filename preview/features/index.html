<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlazePlot Feature Preview</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #050505; color: #e5e5e5; }
    body { font: 13px/1.4 system-ui, sans-serif; }
    header { padding: 10px 12px; border-bottom: 1px solid #333; display: flex; gap: 12px; align-items: center; }
    h1, h2, p { margin: 0; }
    h1 { font-size: 16px; }
    h2 { font-size: 14px; margin-bottom: 4px; }
    a { color: #93c5fd; }
    main { padding: 12px; display: grid; gap: 12px; }
    section { border: 1px solid #333; padding: 10px; background: #0a0a0a; }
    .hint { color: #aaa; margin-bottom: 8px; }
    #heroChart { height: 560px; }
    #linkedCharts { height: 340px; }
    #eventLog { white-space: pre-wrap; font: 12px/1.4 ui-monospace, monospace; color: #ccc; margin: 8px 0 0; }
    button { font: inherit; padding: 4px 8px; }
  </style>
</head>
<body>
  <header>
    <h1>BlazePlot feature preview</h1>
    <a href="/">streaming preview</a>
  </header>

  <main>
    <section>
      <h2>Main feature chart</h2>
      <p class="hint">Drag to select. Wheel to zoom. Shift-drag to pan. Use the navigator at the bottom.</p>
      <div id="heroChart"></div>
    </section>

    <section>
      <h2>Event log</h2>
      <button id="resetButton" type="button">reset views</button>
      <pre id="eventLog">waiting for interaction…</pre>
    </section>

    <section>
      <h2>Linked charts</h2>
      <p class="hint">Two charts with synchronized X range.</p>
      <div id="linkedCharts"></div>
    </section>
  </main>

  <script type="module" src="/features/main.ts"></script>
</body>
</html>
