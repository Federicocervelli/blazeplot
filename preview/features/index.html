<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlazePlot Feature Preview</title>
  <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { color-scheme: dark; --page-bg: #000; --panel-bg: #0a0a0a; --panel-border: #222; --text: #e5e5e5; --muted: #888; --control-bg: #111; --control-border: #333; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--page-bg); color: var(--text); }
    body { height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    #topbar { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center; padding: 5px 10px; background: var(--panel-bg); color: var(--text); justify-content: space-between; border-bottom: 1px solid var(--panel-border); }
    #topbar .left { display: inline-flex; align-items: center; gap: 8px; }
    #topbar .brand { font-weight: 700; letter-spacing: 0.02em; }
    #topbar nav { display: inline-flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    #topbar a { display: inline-flex; align-items: center; color: var(--text); text-decoration: none; padding: 0; line-height: 0; }
    #topbar a:hover { filter: brightness(1.15); }
    #topbar img { display: block; height: 20px; }
    main { min-height: 0; display: grid; grid-template-rows: minmax(0, 1fr) 104px 340px; gap: 6px; }
    section { min-height: 0; overflow: hidden; background: var(--panel-bg); padding: 6px 8px; }
    h2 { height: 16px; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
    #heroChart { height: calc(100% - 20px); min-height: 0; }
    #linkedCharts { height: calc(100% - 20px); min-height: 0; }
    #eventLog { white-space: pre-wrap; font: 11px/1.4 ui-monospace, monospace; color: var(--muted); margin-top: 6px; }
    button { background: var(--control-bg); border: 1px solid var(--control-border); border-radius: 4px; color: var(--text); font: inherit; padding: 2px 6px; cursor: pointer; }
  </style>
</head>
<body>
  <header id="topbar" aria-label="Project links">
    <div class="left">
      <span class="brand">BlazePlot feature preview</span>
    </div>
    <nav>
      <a href="../" style="line-height:1.2;padding:2px 6px;border:1px solid var(--panel-border);border-radius:4px;">main preview</a>
      <a href="../react/" style="line-height:1.2;padding:2px 6px;border:1px solid var(--panel-border);border-radius:4px;">react preview</a>
      <a href="../mobile/" style="line-height:1.2;padding:2px 6px;border:1px solid var(--panel-border);border-radius:4px;">mobile preview</a>
      <a href="https://github.com/Federicocervelli/blazeplot" target="_blank" rel="noreferrer" aria-label="BlazePlot on GitHub">
        <img src="https://img.shields.io/github/stars/Federicocervelli/blazeplot?style=flat&logo=github&logoColor=white&label=GitHub&labelColor=111111&color=444444" alt="GitHub stars: blazeplot" />
      </a>
      <a href="https://www.npmjs.com/package/blazeplot" target="_blank" rel="noreferrer" aria-label="BlazePlot on npm">
        <img src="https://img.shields.io/npm/v/blazeplot?style=flat&logo=npm&logoColor=CB3837&label=npm&labelColor=111111&color=444444" alt="npm: blazeplot" />
      </a>
      <a href="https://cervelli.dev" target="_blank" rel="noreferrer" aria-label="Federico Cervelli portfolio">
        <img src="https://img.shields.io/badge/Portfolio-cervelli.dev-444444?style=flat&logo=googlechrome&logoColor=4285F4&labelColor=111111" alt="Portfolio: cervelli.dev" />
      </a>
      <a href="https://liberapay.com/cervelli/donate" target="_blank" rel="noreferrer" aria-label="Donate on Liberapay">
        <img src="https://img.shields.io/badge/Donate-Liberapay-444444?style=flat&logo=liberapay&logoColor=F6C915&labelColor=111111" alt="Donate: Liberapay" />
      </a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Main feature chart</h2>
      <div id="heroChart"></div>
    </section>

    <section>
      <h2>Event log</h2>
      <button id="resetButton" type="button">reset views</button>
      <pre id="eventLog">waiting for interaction…</pre>
    </section>

    <section>
      <h2>Linked charts</h2>
      <div id="linkedCharts"></div>
    </section>
  </main>

  <script type="module" src="./main.ts"></script>
</body>
</html>
