name: Bug report
description: Report a reproducible BlazePlot bug
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link a repo/sandbox or paste the smallest code sample that reproduces the issue.
      placeholder: |
        import { Chart, StaticDataset } from "blazeplot";
        ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: BlazePlot version
      placeholder: "0.3.5"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "Chrome 148 on macOS 15"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chart rendering
        - Data/datasets
        - Interactions/plugins
        - React wrapper
        - Linked charts
        - Export/screenshots
        - Docs/website
        - Build/package
        - Other
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, console errors, data shape, or performance numbers.
