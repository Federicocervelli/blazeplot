name: Pages

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

env:
  BUN_VERSION: 1.3.14

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main preview
        uses: actions/checkout@v7
        with:
          ref: main
          path: branches/main

      - name: Checkout development preview
        uses: actions/checkout@v7
        with:
          ref: development
          path: branches/development

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun package downloads
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('branches/main/bun.lock', 'branches/development/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ env.BUN_VERSION }}-
            bun-${{ runner.os }}-

      - name: Build main preview
        working-directory: branches/main
        run: |
          bun install --frozen-lockfile
          bun run pages:build

      - name: Build development preview
        working-directory: branches/development
        env:
          BLAZEPLOT_PAGES_BASE: /development/
        run: |
          bun install --frozen-lockfile
          bun run pages:build

      - name: Assemble branch previews
        run: |
          rm -rf build/pages
          mkdir -p build/pages/development
          cp -a branches/main/build/pages/. build/pages/
          cp -a branches/development/build/pages/. build/pages/development/
          rm -rf build/pages/visual build/pages/interaction build/pages/development/visual build/pages/development/interaction
          mkdir -p build/pages/previews build/pages/development/previews
          cp build/pages/index.html build/pages/previews/index.html
          cp build/pages/development/index.html build/pages/development/previews/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/pages

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
