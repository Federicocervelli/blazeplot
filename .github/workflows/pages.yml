name: Pages

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main preview
        uses: actions/checkout@v4
        with:
          ref: main
          path: branches/main

      - name: Checkout development preview
        uses: actions/checkout@v4
        with:
          ref: development
          path: branches/development

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build main preview
        working-directory: branches/main
        run: |
          bun install --frozen-lockfile
          bun run pages:build

      - name: Build development preview
        working-directory: branches/development
        env:
          BLAZEPLOT_PAGES_BASE: /development/
        run: |
          bun install --frozen-lockfile
          bun run pages:build

      - name: Assemble branch previews
        run: |
          rm -rf build/pages
          mkdir -p build/pages/development
          cp -a branches/main/build/pages/. build/pages/
          cp -a branches/development/build/pages/. build/pages/development/
          rm -rf build/pages/visual build/pages/interaction build/pages/development/visual build/pages/development/interaction
          cat > build/pages/previews.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>BlazePlot previews</title>
          <h1>BlazePlot site and previews</h1>
          <ul>
          HTML
          echo '  <li><a href="/">main site</a></li>' >> build/pages/previews.html
          echo '  <li><a href="/#previews">main previews</a></li>' >> build/pages/previews.html
          echo '  <li><a href="/development/">development site</a></li>' >> build/pages/previews.html
          echo '  <li><a href="/development/#previews">development previews</a></li>' >> build/pages/previews.html
          echo '</ul>' >> build/pages/previews.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
