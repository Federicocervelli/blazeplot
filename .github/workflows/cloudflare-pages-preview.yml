name: Cloudflare Pages Preview

on:
  workflow_dispatch:

env:
  BUN_VERSION: 1.3.14
  CLOUDFLARE_PAGES_PROJECT: blazeplot

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-preview-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy branch preview
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages-preview
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve branch metadata
        id: branch
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "development" ]; then
            echo "::error::Cloudflare previews are only for feature branches. Use GitHub Pages for main/development."
            exit 1
          fi
          echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Check Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare Pages preview skipped because CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN are not configured."
          fi

      - name: Setup Bun
        if: steps.cloudflare.outputs.configured == 'true'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node
        if: steps.cloudflare.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Bun package downloads
        if: steps.cloudflare.outputs.configured == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ env.BUN_VERSION }}-
            bun-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cloudflare.outputs.configured == 'true'
        run: bun install --frozen-lockfile

      - name: Build website
        if: steps.cloudflare.outputs.configured == 'true'
        env:
          BLAZEPLOT_PAGES_BASE: /
        run: bun run pages:build

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare.outputs.configured == 'true'
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx --yes wrangler@4 pages project create "${CLOUDFLARE_PAGES_PROJECT}" --production-branch main || true
          npx --yes wrangler@4 pages deploy build/pages \
            --project-name="${CLOUDFLARE_PAGES_PROJECT}" \
            --branch="${{ steps.branch.outputs.name }}" \
            --commit-hash="${{ steps.branch.outputs.sha }}" | tee wrangler-deploy.log
          deployment_url=$(grep -Eo 'https://[^ ]+\.pages\.dev' wrangler-deploy.log | head -n 1)
          alias_url=$(grep -Eo 'https://[^ ]+\.pages\.dev' wrangler-deploy.log | tail -n 1)
          echo "deployment-url=${deployment_url}" >> "$GITHUB_OUTPUT"
          echo "pages-deployment-alias-url=${alias_url}" >> "$GITHUB_OUTPUT"

      - name: Write preview summary
        if: steps.cloudflare.outputs.configured == 'true'
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOYMENT_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          {
            echo "## Cloudflare Pages preview"
            echo
            echo "- Branch: \`${{ steps.branch.outputs.name }}\`"
            echo "- Alias URL: ${DEPLOYMENT_ALIAS_URL:-not reported}"
            echo "- Deployment URL: ${DEPLOYMENT_URL:-not reported}"
          } >> "$GITHUB_STEP_SUMMARY"
