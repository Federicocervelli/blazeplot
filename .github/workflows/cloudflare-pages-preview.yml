name: Cloudflare Pages Preview

on:
  push:
    branches-ignore:
      - main
      - development
  workflow_dispatch:

env:
  BUN_VERSION: 1.3.14
  CLOUDFLARE_PAGES_PROJECT: blazeplot

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-preview-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy branch preview
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages-preview
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve branch metadata
        id: branch
        run: |
          echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Verify Cloudflare credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun package downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ env.BUN_VERSION }}-
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build website
        env:
          BLAZEPLOT_PAGES_BASE: /
        run: bun run pages:build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          wranglerVersion: "4"
          preCommands: wrangler pages project create ${{ env.CLOUDFLARE_PAGES_PROJECT }} --production-branch main || true
          command: pages deploy build/pages --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ steps.branch.outputs.name }} --commit-hash=${{ steps.branch.outputs.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Write preview summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOYMENT_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          {
            echo "## Cloudflare Pages preview"
            echo
            echo "- Branch: \`${{ steps.branch.outputs.name }}\`"
            echo "- Alias URL: ${DEPLOYMENT_ALIAS_URL:-not reported}"
            echo "- Deployment URL: ${DEPLOYMENT_URL:-not reported}"
          } >> "$GITHUB_STEP_SUMMARY"
